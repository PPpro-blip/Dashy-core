<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Session Routing Protocol</title>
    <style>
        :root {
            --bg-main: #090b11;
            --bg-card: #141724;
            --border-color: rgba(255, 255, 255, 0.08);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent-gradient: linear-gradient(135deg, #3b82f6, #8b5cf6);
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-family);
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .error-container {
            text-align: center;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }

        .error-code {
            font-size: 5rem;
            font-weight: 800;
            letter-spacing: -0.05em;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--text-main);
        }

        p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .detected-path-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            padding: 12px;
            border-radius: 10px;
            font-family: monospace;
            font-size: 0.85rem;
            color: #8b5cf6;
            margin-bottom: 32px;
            word-break: break-all;
        }

        .routing-btn {
            display: inline-block;
            background: var(--accent-gradient);
            color: white;
            text-decoration: none;
            padding: 14px 28px;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 12px;
            width: 100%;
            box-shadow: 0 4px 20px rgba(59, 130, 246, 0.25);
            transition: all 0.2s ease;
        }

        .routing-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 24px rgba(59, 130, 246, 0.35);
        }
    </style>
</head>
<body>

    <div class="error-container">
        <div class="error-code">404</div>
        <h1>Invalid Pipeline Path</h1>
        <p>The system could not locate the requested operational directory segment. We detected you were searching for:</p>
        
        <div class="detected-path-box" id="brokenPath">/unknown-route</div>

        <a href="./" class="routing-btn">Reroute to Dashy Core Homepage</a>
    </div>

    <script>
        // Grab the exact broken URL fragment they typed to show them what went wrong
        const currentPath = window.location.pathname;
        document.getElementById('brokenPath').innerText = currentPath;

        // Smart Feature: If they wait 5 seconds, automatically kick them back to safety anyway!
        setTimeout(() => {
            window.location.href = "./";
        }, 6000);
    </script>
</body>
</html>
