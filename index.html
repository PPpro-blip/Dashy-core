<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashy OS // Secure Node Workspace</title>
    
    <script type="text/javascript">
        (function(l) {
            if (l.search[0] === '?') {
                var q = {};
                l.search.slice(1).split('&').forEach(function(v) {
                    var a = v.split('=');
                    q[a[0]] = a.slice(1).join('=').replace(/~and~/g, '&');
                });
                if (q.p !== undefined) {
                    window.history.replaceState(null, null,
                        l.pathname.slice(0, -1) + (q.p || '') +
                        (q.q ? ('?' + q.q) : '') + l.hash
                    );
                }
            }
        }(window.location));
    </script>
    
    <style>
        /* ==========================================================================
           1. MASTER INTERFACE DESIGN SYSTEM & CORE RESET
           ========================================================================== */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Courier New', Courier, monospace; 
        }

        body { 
            background: #02040a; 
            background-image: linear-gradient(rgba(6, 182, 212, 0.05) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(6, 182, 212, 0.05) 1px, transparent 1px); 
            background-size: 30px 30px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden; 
            position: relative; 
        }

        /* PERIMETER CYBER LASER BORDERS */
        body::before, body::after { 
            content: ''; 
            position: absolute; 
            width: 100vw; 
            height: 4px; 
            z-index: 90; 
            pointer-events: none; 
            background: linear-gradient(90deg, #ff007f, #00f0ff, #7000ff, #ff007f); 
            background-size: 300% 100%; 
            animation: rgbLaser 6s linear infinite; 
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.8), 0 0 40px rgba(255, 0, 127, 0.6); 
        }
        body::before { top: 0; }
        body::after { bottom: 0; }

        /* BACKDROP NEON GLOW FIELDS */
        .glow-orb { 
            position: absolute; 
            border-radius: 50%; 
            filter: blur(120px); 
            opacity: 0.35; 
            z-index: 1; 
            pointer-events: none; 
            animation: floatingOrbs 12s infinite ease-in-out alternate; 
        }
        .orb-1 { width: 450px; height: 450px; background: #06b6d4; top: -10%; left: -10%; }
        .orb-2 { width: 500px; height: 500px; background: #d946ef; bottom: -10%; right: -10%; animation-delay: -4s; }

        /* ==========================================================================
           2. IDENTITY SECURE INTERCEPTOR OVERLAY (LOGIN GATE)
           ========================================================================== */
        .auth-overlay { 
            position: fixed; 
            top: 0; left: 0; 
            width: 100vw; height: 100vh; 
            background: #070b12; 
            z-index: 9999; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 20px;
            transition: opacity 0.4s ease, visibility 0.4s;
        }
        .auth-card { 
            background: #0f172a; 
            padding: 40px; 
            border-radius: 28px; 
            border: 1px solid rgba(112, 0, 255, 0.3); 
            box-shadow: 0 25px 70px rgba(0,0,0,0.7); 
            width: 100%; 
            max-width: 460px; 
        }
        .auth-card h1 { 
            font-size: 2.2rem; 
            color: #5865f2; 
            text-shadow: 0 0 15px rgba(88, 101, 242, 0.4);
            text-align: center; 
            letter-spacing: 2px;
            margin-bottom: 8px;
        }
        .auth-subtitle { color: #64748b; text-align: center; font-size: 0.85rem; margin-bottom: 30px; }

        .input-field { margin-bottom: 20px; display: flex; flex-direction: column; gap: 8px; }
        .input-field label { color: #94a3b8; font-size: 0.7rem; font-weight: bold; letter-spacing: 1px; }
        .input-field input { 
            width: 100%; padding: 16px; 
            background: #1e293b; border: 1px solid rgba(255,255,255,0.05); 
            border-radius: 12px; color: #fff; font-size: 0.9rem; outline: none; 
            transition: border 0.2s;
        }
        .input-field input:focus { border-color: #5865f2; }

        .error-banner { 
            color: #ef4444; font-size: 0.75rem; text-align: center; margin-bottom: 20px; 
            display: none; font-weight: bold; letter-spacing: 0.5px;
        }
        #initializeBtn { 
            background: linear-gradient(135deg, #5865f2, #7000ff); color: #fff; 
            border: none; padding: 18px; width: 100%; border-radius: 14px; 
            font-size: 0.95rem; font-weight: bold; letter-spacing: 1.5px; cursor: pointer; 
            box-shadow: 0 4px 20px rgba(88, 101, 242, 0.3); transition: transform 0.2s;
        }
        #initializeBtn:hover { transform: translateY(-2px); }

        /* ==========================================================================
           3. APPLICATION SHELL & WINDOW MATRICES
           ========================================================================== */
        .chat-container { 
            width: 100%; 
            max-width: 950px; 
            height: 85vh; 
            min-height: 550px; /* FIXED: Keeps interface from shrinking to 0 in iframe views */
            background: rgba(10, 15, 30, 0.8); 
            backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px); 
            border-radius: 24px; 
            display: flex; 
            overflow: hidden; 
            position: relative; 
            border: 1px solid rgba(6, 182, 212, 0.3); 
            z-index: 10; 
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1); 
        }

        /* WINDOW STATE ENGINE TRANSFORMS */
        .chat-container.is-minimized {
            height: 65px !important; max-height: 65px !important;
            max-width: 480px !important; border-color: #d946ef !important;
            box-shadow: 0 0 35px rgba(217, 70, 239, 0.6) !important;
            transform: translateY(38vh);
        }
        .chat-container.is-minimized .window-content-body,
        .chat-container.is-minimized .sidebar { display: none !important; }

        .chat-container.fullscreen { 
            max-width: 100vw !important; width: 100vw !important; height: 100vh !important; 
            border-radius: 0px !important; border: none !important; transform: none !important;
        }

        /* ==========================================================================
           4. SIDEBAR LOG COMPONENT STYLE SETS
           ========================================================================== */
        .sidebar { 
            width: 280px; background: rgba(7, 11, 22, 0.98); border-right: 1px solid rgba(6, 182, 212, 0.2); 
            display: flex; flex-direction: column; transition: transform 0.3s ease, width 0.3s ease; 
            transform: translateX(0); overflow: hidden; z-index: 50; 
        }
        .sidebar.closed { width: 0px; transform: translateX(-100%); border-right: none; }
        .sidebar-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .sidebar-header h3 { color: #00f0ff; font-size: 0.9rem; }
        #newChatBtn { background: transparent; color: #00f0ff; border: 1px solid #00f0ff; width: 32px; height: 32px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1.1rem; }

        .search-box { padding: 12px 20px; }
        #searchChats { width: 100%; padding: 12px; background: #02040a; border: 1px solid rgba(6, 182, 212, 0.2); border-radius: 8px; color: #fff; font-size: 0.85rem; outline: none; }

        .chat-list { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
        .chat-item { display: flex; justify-content: space-between; align-items: center; padding: 14px 12px; background: rgba(255, 255, 255, 0.03); border: 1px solid transparent; color: #94a3b8; border-radius: 10px; cursor: pointer; transition: all 0.2s; gap: 8px;}
        .chat-item:hover, .chat-item.active { background: rgba(6, 182, 212, 0.1); color: #fff; border-color: rgba(6, 182, 212, 0.3); }
        .chat-title { font-size: 0.85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
        .delete-chat { background: transparent; border: none; color: #ff4d4d; opacity: 0.7; cursor: pointer; font-size: 1.1rem; padding: 4px; }

        /* ==========================================================================
           5. MAIN CORE INTERFACE WORKSPACE PANELS
           ========================================================================== */
        .main-panel { flex: 1; display: flex; flex-direction: column; background: transparent; min-width: 0; }
        .chat-header { background: rgba(15, 23, 42, 0.7); padding: 15px 20px; border-bottom: 1px solid rgba(6, 182, 212, 0.2); display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        .header-left { display: flex; align-items: center; gap: 12px; min-width: 0; }
        #menuToggleBtn { background: transparent; border: none; font-size: 1.5rem; cursor: pointer; z-index: 55; padding: 4px; }
        .chat-header h2 { font-size: 1.1rem; color: #fff; letter-spacing: 1px; text-shadow: 0 0 10px #06b6d4; white-space: nowrap; }

        .status-tag { background: rgba(34, 197, 94, 0.08); color: #4ade80; padding: 6px 10px; border-radius: 20px; font-size: 0.65rem; border: 1px solid rgba(34, 197, 94, 0.2); display: flex; align-items: center; gap: 6px; white-space: nowrap;}
        .pulse-dot { width: 6px; height: 6px; background: #22c55e; border-radius: 50%; animation: pulse 1.5s infinite; }
        .creator-tag { background: rgba(234, 179, 8, 0.1); color: #eab308; border: 1px solid rgba(234, 179, 8, 0.3); padding: 6px 10px; border-radius: 8px; font-size: 0.65rem; font-weight: bold; letter-spacing: 0.5px; text-transform: uppercase; white-space: nowrap; }

        .window-actions { display: flex; align-items: center; gap: 8px; margin-left: auto; }
        .win-ctrl-btn { background: transparent; color: #00f0ff; border: none; cursor: pointer; padding: 6px; display: flex; align-items: center; transition: color 0.2s, transform 0.2s; }
        .win-ctrl-btn:hover { color: #d946ef; transform: scale(1.1); }

        .window-content-body { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }
        .message { max-width: 85%; padding: 14px 18px; border-radius: 16px; font-size: 0.9rem; line-height: 1.4; word-wrap: break-word; animation: fadeIn 0.3s ease-out forwards; }
        .bot-name { display: block; font-size: 0.65rem; font-weight: bold; margin-bottom: 4px; color: #00f0ff; }

        .user-message { background: linear-gradient(135deg, #d946ef, #7000ff); color: white; align-self: flex-end; border-bottom-right-radius: 4px; box-shadow: 0 4px 15px rgba(217, 70, 239, 0.4); }
        .ai-message { background: rgba(15, 23, 42, 0.9); color: #e2e8f0; align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid rgba(0, 240, 255, 0.15); }

        .input-area { padding: 15px; background: rgba(7, 11, 22, 0.95); display: flex; gap: 10px; border-top: 1px solid rgba(6, 182, 212, 0.2); align-items: center; }
        #userInput { flex: 1; padding: 14px 16px; background: #02040a; border: 1px solid rgba(6, 182, 212, 0.3); border-radius: 14px; color: #fff; font-size: 0.9rem; outline: none; min-width: 0; }

        .btn-group { display: flex; gap: 8px; flex-shrink: 0; }
        #sendBtn, #voiceBtn { color: #020617; border: none; width: 48px; height: 48px; border-radius: 14px; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: all 0.2s ease; }
        #sendBtn { background: linear-gradient(135deg, #00f0ff, #06b6d4); }
        #voiceBtn { background: rgba(255, 255, 255, 0.1); color: #00f0ff; border: 1px solid rgba(0, 240, 255, 0.4); }
        #voiceBtn.listening { background: #ef4444; color: white; border-color: #ef4444; animation: voicePulse 1s infinite alternate; box-shadow: 0 0 15px #ef4444; }

        /* ==========================================================================
           6. MASTER ANIMATION LOGIC SHEETS
           ========================================================================== */
        @keyframes rgbLaser { 0% { background-position: 0% 50%; } 100% { background-position: 300% 50%; } }
        @keyframes floatingOrbs { 0% { transform: translate(0px, 0px) scale(1); } 50% { transform: translate(30px, -50px) scale(1.05); } 100% { transform: translate(-10px, 30px) scale(0.95); } }
        @keyframes pulse { 0% { transform: scale(0.9); opacity: 0.6; } 50% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(0.9); opacity: 0.6; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes voicePulse { from { transform: scale(1); } to { transform: scale(1.08); } }

        @media (max-width: 768px) {
            body { padding: 0; }
            .chat-container { height: 100vh !important; width: 100vw !important; max-width: 100vw !important; border-radius: 0px !important; border: none !important; }
            .chat-container.is-minimized { transform: none; bottom: 0; position: fixed; width: 100vw !important; max-width: 100vw !important; border-radius: 0px !important; }
            body::before, body::after { display: none; }
            .sidebar { position: absolute; left: 0; top: 0; height: 100%; width: 80% !important; max-width: 300px; transform: translateX(0); box-shadow: 5px 0 25px rgba(0,0,0,0.8); }
            .sidebar.closed { transform: translateX(-100%); width: 0 !important; }
        }
    </style>
</head>
<body>

    <div class="auth-overlay" id="authOverlay">
        <div class="auth-card">
            <h1>DASHY OS</h1>
            <p class="auth-subtitle">Enter workspace credentials to link node</p>
            
            <div class="input-field">
                <label>IDENTITY USERNAME</label>
                <input type="text" id="authUsername" placeholder="Pratham Pandey" autocomplete="off">
            </div>

            <div class="input-field">
                <label>NETWORK SUITE EMAIL</label>
                <input type="email" id="authEmail" placeholder="pratham.neoskill@gmail.com" autocomplete="off">
            </div>

            <div class="error-banner" id="errorBanner">Invalid Identity Parameters</div>

            <button id="initializeBtn">INITIALIZE CORE LINK</button> 
        </div>
    </div>

    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>

    <div class="chat-container" id="chatContainer">
        
        <div class="sidebar closed" id="sidebar">
            <div class="sidebar-header">
                <h3>MATRIX LOGS</h3>
                <button id="newChatBtn" title="New Chat">+</button>
            </div>
            <div class="search-box">
                <input type="text" id="searchChats" placeholder="🔍 Search logs...">
            </div>
            <div class="chat-list" id="chatList"></div>
        </div>

        <div class="main-panel">
            <div class="chat-header">
                <div class="header-left">
                    <button id="menuToggleBtn" title="Open Matrix Menu">📜</button>
                    <h2>DASHY INTEL</h2>
                    <div class="status-tag live-tag"><span class="pulse-dot"></span> SECURE MATRIX ACTIVE</div>
                    <div class="creator-tag" id="userNodeDisplay">PRATHAM // OWNER ACTIVE</div>
                </div>
                
                <div class="window-actions">
                    <button id="minimizeBtn" class="win-ctrl-btn" title="Minimize Window">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M19 13H5v-2h14v2z"/></svg>
                    </button>
                    <button id="fullscreenBtn" class="win-ctrl-btn" title="Toggle Fullscreen">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
                    </button>
                </div>
            </div>

            <div class="window-content-body">
                <div class="chat-box" id="chatBox"></div>

                <div class="input-area">
                    <input type="text" id="userInput" placeholder="Command or Talk to Dashy..." autocomplete="off">
                    <div class="btn-group">
                        <button id="voiceBtn" title="Speak to Dashy">🎙️</button>
                        <button id="sendBtn" title="Transmit Packet">
                            <svg viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M2,21L23,12L2,3V10L17,12L2,14V21Z" /></svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>
        // NOTE: Generate a new key from Google AI Studio and put it here if this one flags as leaked.
        const KEYS = ['AIzaSyDt-y0oNPBqBuYoK7Xr_SQVIqfabTkSKaY'];

        let activeChatId = 'chat_1';
        let chatsMemory = JSON.parse(localStorage.getItem('dashy_text_logs_v3')) || {
            'chat_1': { title: 'Initial Matrix ⚔️', logs: [{ text: "Secure pipeline established. Ready for your commands.", sender: "ai" }] }
        };

        const authOverlay = document.getElementById('authOverlay');
        const authUsername = document.getElementById('authUsername');
        const authEmail = document.getElementById('authEmail');
        const errorBanner = document.getElementById('errorBanner');
        const initializeBtn = document.getElementById('initializeBtn');
        const userNodeDisplay = document.getElementById('userNodeDisplay');

        const chatContainer = document.getElementById('chatContainer');
        const sidebar = document.getElementById('sidebar');
        const menuToggleBtn = document.getElementById('menuToggleBtn');
        const minimizeBtn = document.getElementById('minimizeBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const voiceBtn = document.getElementById('voiceBtn');
        const chatList = document.getElementById('chatList');
        const searchChats = document.getElementById('searchChats');
        const newChatBtn = document.getElementById('newChatBtn');

        // IDENTITY CREDENTIAL EVALUATOR SYSTEM
        initializeBtn.addEventListener('click', () => {
            const userVal = authUsername.value.trim();
            const emailVal = authEmail.value.trim();

            if (userVal.toLowerCase().includes('pratham') && emailVal.includes('@')) {
                errorBanner.style.display = 'none';
                userNodeDisplay.innerText = `${userVal.toUpperCase()} // OWNER ACTIVE`;
                
                authOverlay.style.opacity = '0';
                authOverlay.style.visibility = 'hidden';
                setTimeout(() => authOverlay.remove(), 400);
                
                renderSidebar();
                loadActiveChat();
            } else {
                errorBanner.style.display = 'block';
                errorBanner.innerText = "Invalid Identity Parameters";
            }
        });

        // VIEWPORT TRACKING OPERATORS
        fullscreenBtn.addEventListener('click', () => {
            chatContainer.classList.remove('is-minimized');
            chatContainer.classList.toggle('fullscreen');
        });

        minimizeBtn.addEventListener('click', () => {
            chatContainer.classList.remove('fullscreen');
            chatContainer.classList.toggle('is-minimized');
        });

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        let isListening = false;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.lang = 'en-US';
            recognition.onstart = () => { isListening = true; voiceBtn.classList.add('listening'); userInput.placeholder = "Listening..."; };
            recognition.onerror = () => stopListening();
            recognition.onend = () => stopListening();
            recognition.onresult = (event) => { userInput.value = event.results[0][0].transcript; handleSend(); };
        } else {
            voiceBtn.style.display = 'none';
        }

        function stopListening() { isListening = false; voiceBtn.classList.remove('listening'); userInput.placeholder = "Command or Talk to Dashy..."; if(recognition) recognition.stop(); }
        voiceBtn.addEventListener('click', () => { if (!recognition) return; window.speechSynthesis.cancel(); if (isListening) stopListening(); else recognition.start(); });

        function speakResponse(text) {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text.replace(/[\*\#\_]/g, ""));
            utterance.lang = 'en-US';
            window.speechSynthesis.speak(utterance);
        }

        menuToggleBtn.addEventListener('click', () => sidebar.classList.toggle('closed'));

        function renderSidebar(filterText = '') {
            chatList.innerHTML = '';
            Object.keys(chatsMemory).forEach(id => {
                if (chatsMemory[id].title.toLowerCase().includes(filterText.toLowerCase())) {
                    const chatItem = document.createElement('div');
                    chatItem.classList.add('chat-item');
                    if (id === activeChatId) chatItem.classList.add('active');
                    
                    const chatTitle = document.createElement('span');
                    chatTitle.classList.add('chat-title');
                    chatTitle.innerText = chatsMemory[id].title;
                    chatTitle.addEventListener('click', () => { activeChatId = id; if(window.innerWidth <= 768) sidebar.classList.add('closed'); renderSidebar(); loadActiveChat(); window.speechSynthesis.cancel(); });

                    const deleteBtn = document.createElement('button');
                    deleteBtn.classList.add('delete-chat');
                    deleteBtn.innerText = '🗑️';
                    deleteBtn.addEventListener('click', (e) => { 
                        e.stopPropagation(); 
                        delete chatsMemory[id]; 
                        if(Object.keys(chatsMemory).length === 0){
                            chatsMemory['chat_1'] = { title: 'Initial Matrix ⚔️', logs: [{ text: "Secure pipeline established.", sender: "ai" }] };
                            activeChatId = 'chat_1';
                        } else { activeChatId = Object.keys(chatsMemory)[0]; }
                        saveToMemory(); renderSidebar(); loadActiveChat(); 
                    });

                    chatItem.appendChild(chatTitle);
                    chatItem.appendChild(deleteBtn);
                    chatList.appendChild(chatItem);
                }
            });
        }

        function loadActiveChat() { chatBox.innerHTML = ''; chatsMemory[activeChatId].logs.forEach(log => appendMessage(log.text, log.sender)); }
        function appendMessage(text, sender) {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message', `${sender}-message`);
            if (sender === 'ai') messageDiv.innerHTML = `<span class="bot-name">DASHY:</span><span>${text}</span>`;
            else messageDiv.innerText = text;
            chatBox.appendChild(messageDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function saveToMemory() { localStorage.setItem('dashy_text_logs_v3', JSON.stringify(chatsMemory)); }

        async function attemptFetch(text, keyIndex) {
            if (keyIndex >= KEYS.length) throw new Error("API keys exhausted.");
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${KEYS[keyIndex]}`;
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: text }] }],
                    systemInstruction: { parts: [{ text: "You are Dashy, a highly advanced terminal entity. Your creator is Pratham." }] }
                })
            });
            const data = await response.json();
            if (data.error) return attemptFetch(text, keyIndex + 1);
            return data;
        }

        async function handleSend() {
            const text = userInput.value.trim();
            if (!text) return;

            if (chatsMemory[activeChatId].logs.length === 1 && chatsMemory[activeChatId].title.includes('Initial')) {
                chatsMemory[activeChatId].title = text.substring(0, 18) + '...';
                renderSidebar();
            }

            appendMessage(text, 'user');
            chatsMemory[activeChatId].logs.push({ text: text, sender: 'user' });
            userInput.value = '';

            const typingDiv = document.createElement('div');
            typingDiv.classList.add('message', 'ai-message');
            typingDiv.innerHTML = `<span class="bot-name">DASHY:</span> Syncing...`;
            chatBox.appendChild(typingDiv);
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const data = await attemptFetch(text, 0);
                typingDiv.remove();
                if (data.candidates && data.candidates[0].content?.parts[0].text) {
                    const aiResponse = data.candidates[0].content.parts[0].text;
                    appendMessage(aiResponse, 'ai');
                    chatsMemory[activeChatId].logs.push({ text: aiResponse, sender: 'ai' });
                    speakResponse(aiResponse);
                }
                saveToMemory();
            } catch (error) {
                typingDiv.remove();
                appendMessage("Interface Error.", 'ai');
            }
        }

        searchChats.addEventListener('input', (e) => renderSidebar(e.target.value));
        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSend(); });
        newChatBtn.addEventListener('click', () => {
            const newId = `chat_${Date.now()}`;
